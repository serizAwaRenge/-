<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>🌉 青银通 · 代际互助平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', '微软雅黑', sans-serif; }
    body { background: #f5efe9; padding: 20px 12px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .app-wrapper { max-width: 1200px; width: 100%; background: #fffcf8; border-radius: 40px; box-shadow: 0 10px 30px rgba(120, 70, 50, 0.1); overflow: hidden; border: 1px solid #f0dbd0; padding: 30px 24px 20px; }
    .page { display: none; opacity: 0; transition: opacity 0.25s; }
    .page.active { display: block; opacity: 1; }
    .inner-page { display: none; }
    .inner-page.active { display: block; }
    .auth-container { max-width: 450px; margin: 20px auto; }
    .auth-tabs { display: flex; gap: 10px; margin-bottom: 30px; }
    .auth-tab { flex: 1; text-align: center; padding: 16px; font-size: 22px; font-weight: 600; background: #f0dbd0; border-radius: 40px; cursor: pointer; color: #5e3e34; }
    .auth-tab.active { background: #c03a2b; color: white; }
    .auth-form { background: white; border-radius: 30px; padding: 30px; border: 1px solid #eed9cf; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 20px; font-weight: 600; color: #412e25; margin-bottom: 8px; }
    .form-group input, .form-group select { width: 100%; padding: 16px 18px; font-size: 20px; border: 1px solid #eed9cf; border-radius: 40px; background: white; }
    .auth-btn { width: 100%; padding: 18px; font-size: 24px; font-weight: 700; background: #c03a2b; color: white; border: none; border-radius: 60px; cursor: pointer; margin-top: 10px; }
    .switch-link { text-align: center; margin-top: 20px; font-size: 18px; color: #7a5a4a; cursor: pointer; }
    .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logout-btn { background: none; border: 1px solid #c03a2b; color: #c03a2b; padding: 8px 20px; border-radius: 30px; font-size: 18px; cursor: pointer; }
    .header-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 2px dashed #dab9ab; padding-bottom: 18px; }
    .header-title h1 { font-size: 36px; font-weight: 700; color: #412e25; display: flex; align-items: center; gap: 8px; }
    .header-title h1 img { height: 45px; width: auto; }
    .red-tag { background: #c03a2b; color: white; padding: 10px 24px; border-radius: 50px; font-size: 22px; font-weight: 600; }
    .greeting { font-size: 26px; color: #6b4a3c; margin-bottom: 25px; }
    .story-block { background: #fdefe5; border-left: 12px solid #c03a2b; border-radius: 30px; padding: 22px 28px; margin-bottom: 35px; display: flex; align-items: center; justify-content: space-between; }
    .ai-play-btn { background: white; border: none; border-radius: 60px; padding: 16px 30px; font-size: 22px; font-weight: 600; color: #9e3e2a; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.1s; }
    .four-functions { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 40px; }
    .func-box { background: white; border-radius: 30px; padding: 28px 12px; text-align: center; border: 1px solid #f3dbd0; cursor: pointer; transition: all 0.15s; }
    .func-box:hover { transform: translateY(-3px); }
    .func-box i { font-size: 48px; color: #b45a42; margin-bottom: 18px; }
    .func-box .title { font-size: 24px; font-weight: 700; }
    .three-big-buttons { display: flex; gap: 20px; margin-bottom: 30px; }
    .big-action { flex: 1; border-radius: 40px; padding: 30px 10px; text-align: center; color: white; cursor: pointer; }
    .emergency-btn { background: #c62828; } .guardian-btn { background: #1a4b63; } .service-btn { background: #3f6857; }
    .service-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 22px; margin-bottom: 40px; }
    .service-item { background: white; border-radius: 28px; padding: 26px 12px; text-align: center; border: 1px solid #eed9cf; cursor: pointer; }
    .intergen-area { background: #e8d9cf; border-radius: 40px; padding: 30px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .volunteer-btn { background: #c03a2b; color: white; padding: 16px 36px; border-radius: 60px; font-size: 22px; font-weight: 700; border: none; cursor: pointer; }
    .learning-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; margin: 25px 0; }
    .learning-card { background: #f3e3db; border-radius: 28px; overflow: hidden; cursor: pointer; transition: transform 0.15s; }
    .learning-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
    .learning-card img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .learning-card .card-label { padding: 16px 12px; text-align: center; font-size: 20px; font-weight: 600; color: #412e25; background: white; }
    .chat-container { background: #fdf8f5; border-radius: 30px; padding: 20px; min-height: 400px; max-height: 500px; overflow-y: auto; }
    .chat-message { display: flex; margin-bottom: 20px; }
    .chat-message.ai { justify-content: flex-start; } .chat-message.user { justify-content: flex-end; }
    .message-bubble { max-width: 70%; padding: 18px 22px; border-radius: 30px; font-size: 22px; animation: popIn 0.25s; }
    .ai .message-bubble { background: white; border: 1px solid #f0dbd0; } .user .message-bubble { background: #c03a2b; color: white; }
    .typing-cursor { display: inline-block; width: 3px; height: 1.2em; background: #b1422b; margin-left: 4px; animation: blink 0.8s infinite; }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } } @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    .quick-questions { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
    .quick-btn { background: white; border: 1px solid #eed9cf; padding: 12px 20px; border-radius: 40px; font-size: 20px; cursor: pointer; }
    .chat-input-area { display: flex; gap: 15px; }
    .chat-input-area input { flex: 1; padding: 18px 22px; font-size: 22px; border: 1px solid #eed9cf; border-radius: 60px; }
    .chat-input-area button { background: #c03a2b; color: white; border: none; border-radius: 60px; padding: 0 35px; font-size: 22px; font-weight: 600; cursor: pointer; }
    .profile-card { background: white; border-radius: 30px; padding: 24px; margin-bottom: 25px; display: flex; align-items: center; gap: 25px; }
    .profile-icon { font-size: 70px; color: #b45a42; }
    .health-summary { display: flex; gap: 20px; margin-bottom: 25px; }
    .health-item { background: #f9ede6; border-radius: 20px; padding: 16px 20px; flex:1; text-align: center; }
    .health-item .value { font-size: 32px; font-weight: 700; color: #b1422b; }
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 15px; margin-bottom: 25px; }
    .stat-item { background: #f9ede6; border-radius: 20px; padding: 18px; text-align: center; }
    .stat-value { font-size: 32px; font-weight: 700; color: #b1422b; }
    .menu-list { background: white; border-radius: 30px; border: 1px solid #eed9cf; overflow: hidden; }
    .menu-item { padding: 22px 28px; font-size: 24px; border-bottom: 1px solid #f0dbd0; display: flex; align-items: center; gap: 20px; cursor: pointer; }
    .menu-item i { width: 36px; color: #b45a42; }
    .bottom-nav { display: flex; background: white; border-top: 2px solid #f0dbd0; padding: 12px 20px; margin-top: 10px; }
    .nav-item { flex: 1; text-align: center; font-size: 22px; color: #7a5a4a; padding: 12px; border-radius: 40px; cursor: pointer; }
    .nav-item i { font-size: 32px; display: block; margin-bottom: 6px; }
    .nav-item.active { background: #f3e3db; color: #b1422b; font-weight: 700; }

    /* ========= 移动端响应式优化 ========= */
    @media (max-width: 700px) {
      body { padding: 10px 6px; }
      .app-wrapper { border-radius: 30px; padding: 20px 12px 15px; }
      .header-title { flex-wrap: wrap; gap: 10px; }
      .header-title h1 { font-size: 24px; }
      .header-title h1 img { height: 32px; }
      .red-tag { font-size: 16px; padding: 6px 16px; }
      .greeting { font-size: 20px; margin-bottom: 18px; }
      .story-block { padding: 16px 18px; flex-direction: column; align-items: flex-start; gap: 12px; }
      .story-block .story-text h3 { font-size: 22px; }
      .ai-play-btn { padding: 12px 20px; font-size: 18px; }
      .four-functions { grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 25px; }
      .func-box { padding: 18px 8px; }
      .func-box i { font-size: 36px; margin-bottom: 12px; }
      .func-box .title { font-size: 18px; }
      .three-big-buttons { flex-direction: column; gap: 12px; }
      .big-action { padding: 20px 10px; }
      .big-action i { font-size: 36px; }
      .big-action .main-text { font-size: 22px; }
      .service-grid { grid-template-columns: repeat(2,1fr); gap: 12px; }
      .service-item { padding: 18px 8px; }
      .service-item i { font-size: 36px; }
      .service-item .name { font-size: 18px; }
      .intergen-area { flex-direction: column; text-align: center; gap: 16px; }
      .volunteer-btn { padding: 12px 24px; font-size: 18px; }
      .learning-grid { gap: 12px; }
      .learning-card .card-label { font-size: 16px; padding: 12px 6px; }
      .chat-container { min-height: 350px; max-height: 400px; padding: 12px; }
      .message-bubble { font-size: 18px; padding: 14px 16px; max-width: 85%; }
      .quick-btn { font-size: 16px; padding: 8px 14px; }
      .chat-input-area input { font-size: 18px; padding: 14px 16px; }
      .chat-input-area button { padding: 0 20px; font-size: 18px; }
      .profile-card { flex-direction: column; text-align: center; }
      .profile-icon { font-size: 60px; }
      .health-summary { flex-direction: column; gap: 10px; }
      .stat-grid { gap: 10px; }
      .stat-item { padding: 12px; }
      .stat-value { font-size: 24px; }
      .menu-item { padding: 16px 18px; font-size: 20px; }
      .bottom-nav { padding: 8px 8px; }
      .nav-item { font-size: 14px; padding: 6px; }
      .nav-item i { font-size: 24px; }
      .auth-container { padding: 0 10px; }
      .auth-form { padding: 20px; }
      .auth-tab { font-size: 18px; padding: 12px; }
      .form-group label { font-size: 18px; }
      .form-group input, .form-group select { padding: 12px 16px; font-size: 18px; }
      .auth-btn { font-size: 20px; padding: 14px; }
    }

    /* 针对超小屏（iPhone SE 等）进一步优化 */
    @media (max-width: 400px) {
      .header-title h1 { font-size: 20px; }
      .greeting { font-size: 18px; }
      .func-box .title { font-size: 16px; }
      .big-action .main-text { font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
  <!-- 登录注册页 -->
  <div id="authPage" class="page active">
    <div style="text-align: center; margin-bottom: 30px;">
      <h1 style="font-size: 48px; color: #c03a2b; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <img src="logo.png" alt="青银通" style="height: 60px; width: auto;">
        青银通
      </h1>
      <p style="font-size: 22px; color: #7a5a4a;">代际互助 · 红色传承</p>
    </div>
    <div class="auth-container">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">登录</div>
        <div class="auth-tab" data-tab="register">注册</div>
      </div>
      <div id="loginForm" class="auth-form">
        <div class="form-group"><label>手机号 / 账号</label><input type="text" id="loginPhone" placeholder="请输入手机号"></div>
        <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码"></div>
        <button class="auth-btn" id="loginBtn">登 录</button>
        <p class="switch-link" id="goToRegister">还没有账号？立即注册</p>
      </div>
      <div id="registerForm" class="auth-form" style="display: none;">
        <div class="form-group"><label>身份</label><select id="regRole"><option value="elder">👴 老年人</option><option value="volunteer">🌱 青年志愿者</option></select></div>
        <div class="form-group"><label>姓名</label><input type="text" id="regName" placeholder="真实姓名"></div>
        <div class="form-group"><label>性别</label><select id="regGender"><option value="男">男</option><option value="女">女</option></select></div>
        <div class="form-group"><label>手机号</label><input type="text" id="regPhone" placeholder="11位手机号"></div>
        <div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="至少6位"></div>
        <div class="form-group"><label>年龄</label><input type="number" id="regAge" placeholder="年龄"></div>
        <div class="form-group"><label>所在社区</label><input type="text" id="regCommunity" placeholder="例如：红星社区"></div>
        <button class="auth-btn" id="registerBtn">注 册</button>
        <p class="switch-link" id="goToLogin">已有账号？去登录</p>
      </div>
    </div>
  </div>

  <!-- 主应用容器 -->
  <div id="appMain" class="page"></div>
</div>

<script>
  (function(){
    const STORAGE_KEY = 'qingyin_users';
    let currentUser = null;

    function initDefaultUsers() {
      let users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      if (users.length === 0) {
        users = [
          { phone: '13800001111', password: '123456', name: '陈玉兰', role: 'elder', age: 82, community: '红星社区', gender: '女' },
          { phone: '13912345678', password: '123456', name: '李明', role: 'volunteer', age: 24, community: '阳光社区', gender: '男' }
        ];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
      }
    }
    initDefaultUsers();

    function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    function saveUsers(users) { localStorage.setItem(STORAGE_KEY, JSON.stringify(users)); }

    function login(phone, password) {
      const users = getUsers();
      const user = users.find(u => u.phone === phone && u.password === password);
      if (user) { currentUser = { ...user }; delete currentUser.password; return true; }
      return false;
    }

    function register(userData) {
      const users = getUsers();
      if (users.find(u => u.phone === userData.phone)) return false;
      users.push(userData);
      saveUsers(users);
      return true;
    }

    function logout() {
      currentUser = null;
      document.getElementById('authPage').classList.add('active');
      document.getElementById('appMain').classList.remove('active');
      document.getElementById('appMain').innerHTML = '';
    }

    function showMainApp() {
      document.getElementById('authPage').classList.remove('active');
      const mainEl = document.getElementById('appMain');
      mainEl.classList.add('active');
      mainEl.innerHTML = currentUser.role === 'elder' ? renderElderApp() : renderVolunteerApp();
      if (currentUser.role === 'elder') { initElderEvents(); initAIChat(); } 
      else { initVolunteerEvents(); }
      bindNavigation();
      document.querySelector('.logout-btn')?.addEventListener('click', logout);
    }

    function renderElderApp() {
      const honorific = currentUser.gender === '女' ? '奶奶' : '爷爷';
      return `
        <div class="user-bar"><span style="font-size:24px;"><i class="fas fa-user-circle"></i> ${currentUser.name}${honorific}，${currentUser.age}岁</span><button class="logout-btn"><i class="fas fa-sign-out-alt"></i> 退出</button></div>
        <div id="homePage" class="inner-page active">
          <div class="header-title">
            <h1><img src="logo.png" alt="Logo">青银通 · 长者版</h1>
            <div class="red-tag">红色传承</div>
          </div>
          <div class="greeting">👵 <strong>${currentUser.name}${honorific}</strong>，下午好！  |  ${currentUser.community}</div>
          <div class="story-block"><div><span class="label">🎙️ AI留声机</span><h3>渡江英雄马毛姐</h3></div><div class="ai-play-btn" data-elder="story"><i class="fas fa-play-circle"></i> 收听</div></div>
          <div class="four-functions">
            <div class="func-box" data-elder="health"><i class="fas fa-heartbeat"></i><div class="title">健康数据</div></div>
            <div class="func-box" data-elder="find"><i class="fas fa-magnifying-glass"></i><div class="title">找服务</div></div>
            <div class="func-box" data-elder="consult"><i class="fas fa-stethoscope"></i><div class="title">健康咨询</div></div>
            <div class="func-box" data-elder="life"><i class="fas fa-life-ring"></i><div class="title">生活帮助</div></div>
          </div>
          <div class="three-big-buttons"><div class="big-action service-btn" data-elder="service"><i class="fas fa-headset"></i><div class="main-text">联系客服</div></div></div>
          <div class="intergen-area"><div><h3>代际互助</h3><p>青年志愿者可为您提供帮助</p></div><span class="volunteer-btn" data-elder="callVolunteer">呼叫志愿者</span></div>
        </div>
        <div id="servicePage" class="inner-page">
          <div class="header-title"><h1><img src="logo.png" alt="Logo">服务中心</h1><div class="red-tag">颐养</div></div>
          <div class="service-grid">
            <div class="service-item" data-elder="news"><i class="fas fa-newspaper"></i><div class="name">热点资讯</div></div>
            <div class="service-item" data-elder="policy"><i class="fas fa-file-invoice"></i><div class="name">政策跟进</div></div>
            <div class="service-item" data-elder="device"><i class="fas fa-wheelchair"></i><div class="name">辅具租借</div></div>
            <div class="service-item" data-elder="house"><i class="fas fa-broom"></i><div class="name">家政服务</div></div>
          </div>
          <div class="intergen-area"><div><h3>红色故事会</h3><p>每周三下午2点</p></div><i class="fas fa-calendar-alt" style="font-size:60px;color:#b1422b;"></i></div>
        </div>
        <div id="aiPage" class="inner-page">
          <div class="header-title"><h1><img src="logo.png" alt="Logo"><i class="fas fa-robot"></i> AI助手</h1><div class="red-tag">语音/文字</div></div>
          <div class="chat-container" id="chatContainer"><div class="chat-message ai"><div class="message-bubble">您好，${currentUser.name}${honorific}，我是您的AI助手，请问有什么可以帮到您？</div></div></div>
          <div class="quick-questions"><span class="quick-btn" data-q="今天天气怎么样">🌤️ 天气</span><span class="quick-btn" data-q="血压正常吗">❤️ 血压</span><span class="quick-btn" data-q="附近助餐点">🍚 助餐点</span></div>
          <div class="chat-input-area"><input id="chatInput" placeholder="请输入问题"><button id="sendChatBtn"><i class="fas fa-paper-plane"></i> 发送</button></div>
        </div>
        <div id="profilePage" class="inner-page">
          <div class="header-title"><h1><img src="logo.png" alt="Logo">个人中心</h1><div class="red-tag">光荣在党50年</div></div>
          <div class="profile-card"><div class="profile-icon"><i class="fas fa-user-circle"></i></div><div><h3>${currentUser.name}</h3><p>${currentUser.gender} · ${currentUser.age}岁 · ${currentUser.community}</p></div></div>
          <div class="health-summary"><div class="health-item"><i class="fas fa-heart"></i><div class="value">128/82</div><div>血压</div></div><div class="health-item"><i class="fas fa-heartbeat"></i><div class="value">72</div><div>心率</div></div></div>
          <div class="menu-list">
            <div class="menu-item" data-elder="healthRecord"><i class="fas fa-notes-medical"></i> 健康档案</div>
            <div class="menu-item" data-elder="deviceRecord"><i class="fas fa-wheelchair"></i> 我的辅具</div>
            <div class="menu-item" data-elder="contact"><i class="fas fa-address-book"></i> 常用联系人</div>
            <div class="menu-item" data-elder="redStory"><i class="fas fa-history"></i> 红色传承记录</div>
            <div class="menu-item" data-elder="setting"><i class="fas fa-cog"></i> 大字体设置</div>
          </div>
        </div>
        <div class="bottom-nav">
          <div class="nav-item active" data-nav="home"><i class="fas fa-home"></i>首页</div>
          <div class="nav-item" data-nav="service"><i class="fas fa-concierge-bell"></i>服务</div>
          <div class="nav-item" data-nav="ai"><i class="fas fa-robot"></i>AI助手</div>
          <div class="nav-item" data-nav="profile"><i class="fas fa-user"></i>我的</div>
        </div>
      `;
    }

    function renderVolunteerApp() {
      return `
        <div class="user-bar"><span style="font-size:24px;"><i class="fas fa-user-circle"></i> ${currentUser.name}，${currentUser.age}岁 · 志愿者</span><button class="logout-btn"><i class="fas fa-sign-out-alt"></i> 退出</button></div>
        <div id="homePage" class="inner-page active">
          <div class="header-title">
            <h1><img src="logo.png" alt="Logo">青银通 · 志愿版</h1>
            <div class="red-tag">红色传承</div>
          </div>
          <div class="greeting">👋 ${currentUser.name}，下午好！  |  累计服务286小时</div>
          <div class="story-block"><div><span class="label">📖 今日红色故事</span><h3>半条被子</h3></div><div class="ai-play-btn" data-vol="story"><i class="fas fa-play-circle"></i> 收听</div></div>
          <div class="four-functions">
            <div class="func-box" data-vol="sign"><i class="fas fa-calendar-check"></i><div class="title">服务签到</div></div>
            <div class="func-box" data-vol="order"><i class="fas fa-hand-holding-heart"></i><div class="title">接单服务</div></div>

            <div class="service-item" data-vol="mealHelp"><i class="fas fa-utensils"></i><div class="name">助餐协助</div></div>

        <div id="aiPage" class="inner-page">
          <div class="header-title"><h1><img src="logo.png" alt="Logo"><i class="fas fa-video"></i> 在线学习</h1><div class="red-tag">青年大学习</div></div>

    function bindNavigation() {
      const navItems = document.querySelectorAll('.nav-item');
      const pages = {
        home: document.getElementById('homePage'),
        service: document.getElementById('servicePage'),
        ai: document.getElementById('aiPage'),
        profile: document.getElementById('profilePage')
      };
      navItems.forEach(item => {
        item.addEventListener('click', () => {
          const target = item.dataset.nav;
          Object.values(pages).forEach(p => p.classList.remove('active'));
          pages[target].classList.add('active');
          navItems.forEach(n => n.classList.remove('active'));
          item.classList.add('active');
        });
      });
    }

    function showMsg(m) { alert(m); }

    function initElderEvents() {
      document.querySelectorAll('[data-elder]').forEach(el => {
        el.addEventListener('click', () => showMsg(`功能：${el.dataset.elder} (演示)`));
      });
    }
    function initVolunteerEvents() {
      document.querySelectorAll('[data-vol]').forEach(el => {
        el.addEventListener('click', () => showMsg(`功能：${el.dataset.vol} (演示)`));
      });
    }

    function initAIChat() {
      const chatContainer = document.getElementById('chatContainer');
      if (!chatContainer) return;
      const input = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendChatBtn');
      function addUserMessage(t) {
        const d = document.createElement('div'); d.className = 'chat-message user';
        d.innerHTML = `<div class="message-bubble">${t}</div>`;
        chatContainer.appendChild(d); chatContainer.scrollTop = chatContainer.scrollHeight;
      }
      function getReply(q) {
        if (q.includes('天气')) return '今天晴，18-25℃，适合散步。';
        if (q.includes('血压')) return '根据记录，血压128/82，正常。';
        if (q.includes('助餐')) return '红星社区食堂，距您200米。';
        return '您可以问我天气、血压等问题。';
      }
      async function addAIMessage(t) {
        const d = document.createElement('div'); d.className = 'chat-message ai';
        const b = document.createElement('div'); b.className = 'message-bubble'; d.appendChild(b); chatContainer.appendChild(d);
        let i = 0; const c = document.createElement('span'); c.className = 'typing-cursor'; b.appendChild(c);
        function type() { if (i < t.length) { b.insertBefore(document.createTextNode(t.charAt(i)), c); i++; chatContainer.scrollTop = chatContainer.scrollHeight; setTimeout(type, 40); } else { c.remove(); } }
        type();
      }
      async function send(t) { if (!t) return; addUserMessage(t); input.value = ''; setTimeout(() => addAIMessage(getReply(t)), 400); }
      sendBtn.addEventListener('click', () => send(input.value));
      input.addEventListener('keypress', e => { if (e.key === 'Enter') send(input.value); });
      document.querySelectorAll('.quick-btn').forEach(b => b.addEventListener('click', () => send(b.dataset.q)));
    }

    // 登录注册逻辑
    const authTabs = document.querySelectorAll('.auth-tab');
    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    function switchAuthTab(tab) {
      authTabs.forEach(t => t.classList.remove('active'));
      document.querySelector(`.auth-tab[data-tab="${tab}"]`).classList.add('active');
      loginFormDiv.style.display = tab === 'login' ? 'block' : 'none';
      registerFormDiv.style.display = tab === 'register' ? 'block' : 'none';
    }
    authTabs.forEach(t => t.addEventListener('click', () => switchAuthTab(t.dataset.tab)));
    document.getElementById('goToRegister').addEventListener('click', () => switchAuthTab('register'));
    document.getElementById('goToLogin').addEventListener('click', () => switchAuthTab('login'));

    document.getElementById('loginBtn').addEventListener('click', () => {
      const phone = document.getElementById('loginPhone').value.trim();
      const pwd = document.getElementById('loginPassword').value;
      if (login(phone, pwd)) showMainApp(); else alert('账号或密码错误');
    });
    document.getElementById('registerBtn').addEventListener('click', () => {
      const role = document.getElementById('regRole').value;
      const name = document.getElementById('regName').value.trim();
      const gender = document.getElementById('regGender').value;
      const phone = document.getElementById('regPhone').value.trim();
      const pwd = document.getElementById('regPassword').value;
      const age = document.getElementById('regAge').value;
      const community = document.getElementById('regCommunity').value.trim();
      if (!name || !phone || !pwd || !age || !community) return alert('请填写完整信息');
      if (pwd.length < 6) return alert('密码至少6位');
      const user = { phone, password: pwd, name, role, age: parseInt(age), community, gender };
      if (register(user)) { alert('注册成功，请登录'); switchAuthTab('login'); } 
      else { alert('手机号已被注册'); }
    });
  })();
</script>
